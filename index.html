<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Page</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Firefox_logo%2C_2019.svg/960px-Firefox_logo%2C_2019.svg.png">

<style>
:root{
  --bg:#2b2a33;
  --card:#3a3944;
  --card-hover:#4a4956;
  --text:#f5f5f7;
  --muted:#b0b3c0;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
}
#logo img{width:42px;}
.section-title{
  width:85%;
  margin:30px auto 10px;
  text-align:left;
  font-size:18px;
  color:var(--muted);
}
.sites{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-bottom:40px;
  flex-wrap:wrap;
}
.site{
  background:var(--card);
  padding:16px 22px;
  border-radius:14px;
  cursor:pointer;
  transition:background .2s;
  display:flex;
  align-items:center;
  gap:10px;
}
.site:hover{background:var(--card-hover);}
.site img{
  width:24px;
  height:24px;
  border-radius:4px;
  object-fit:contain;
}
.news{
  width:85%;
  margin:auto;
  display:flex;
  gap:20px;
}
.news-column{ display:flex; flex-direction:column; gap:20px; flex:1 1 0; }
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:background .2s, box-shadow .18s ease;
  display:flex;
  flex-direction:column;
  min-height:260px; /* uniform base height */
}
.card:hover{background:var(--card-hover); box-shadow: 0 8px 20px rgba(0,0,0,0.12);} 
.card img.hero{
  width:100%;
  height:160px;
  object-fit:cover;
  flex:0 0 160px; /* keep image area consistent */
}

/* Excerpt shown below title inside the card */
.card .excerpt{
  color:var(--muted);
  padding:0 12px 0 12px;
  font-size:13px;
  line-height:1.35;
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition: max-height .32s ease, opacity .18s ease, padding .18s ease;
}
.card:hover .excerpt{
  padding:8px 12px 14px 12px;
  /* large max-height so the excerpt can expand to fit content; transition animates from 0 to content height */
  max-height:1000px;
  opacity:1;
}
.card-content{padding:12px; flex:1 1 auto; display:flex; flex-direction:column; min-height:100px;}
.card-content .title{ max-height:3.6em; line-height:1.2; overflow:hidden; transition:max-height .28s ease; display:-webkit-box; -webkit-line-clamp:3; line-clamp:3; -webkit-box-orient:vertical; }
.card:hover .card-content .title{ max-height:1000px; }
.source{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:6px;
}
.source img{
  width:16px;
  height:16px;
  border-radius:3px;
}
.timeago{
  position:absolute;
  top:8px;
  right:10px;
  font-size:11px;
  background:rgba(0,0,0,.4);
  padding:3px 6px;
  border-radius:8px;
}
.weatherInfoLink{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:var(--text);
}
.weatherIcon{width:32px;}
.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

/* ---------- DESMOS SIDEBAR ---------- */
#desmosSidebar{
  position:fixed;
  top:0;
  right:-420px;
  width:420px;
  height:100vh;
  background:var(--bg);
  box-shadow:-4px 0 12px rgba(0,0,0,.4);
  transition:right .35s ease-in-out;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
body.desmos-open #desmosSidebar{right:0;}

/* wrapper that holds everything on the left side */
.mainWrapper{
  /* transition is always present – the class only adds the margin */
  transition:margin-right .35s ease-in-out;
  will-change:margin-right;
}
body.desmos-open .mainWrapper{margin-right:420px;}

/* header inside the sidebar – close‑icon + toggle */
.desmosHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
}
#desmosClose{
  font-size:1.5rem;
  cursor:pointer;
  color:var(--muted);
}

/* toggle switch */
.toggleContainer{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--text);
}
.toggleContainer input[type="checkbox"]{
  appearance:none;
  width:40px;
  height:20px;
  background:var(--card);
  border-radius:10px;
  position:relative;
  cursor:pointer;
  outline:none;
}
.toggleContainer input[type="checkbox"]::after{
  content:"";
  width:18px;
  height:18px;
  background:var(--text);
  border-radius:50%;
  position:absolute;
  top:1px;
  left:1px;
  transition:left .2s;
}
.toggleContainer input[type="checkbox"]:checked::after{left:21px;}
.toggleContainer input[type="checkbox"]:checked{background:var(--card-hover);}

/* iframe that shows Desmos */
#desmosFrame{
  flex:1;
  border:none;
}

/* Mobile: hide the top site shortcut tiles to save space */
@media (max-width: 640px) {
  .sites { display: none; }
}
</style>
</head>

<body>

<div class="mainWrapper">
  <header>
    <div id="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Firefox_logo%2C_2019.svg/960px-Firefox_logo%2C_2019.svg.png"></div>
    <div id="weather">
      <a href="https://www.accuweather.com/en/us/blacksburg-va/24060/daily-weather-forecast/331254" class="weatherInfoLink">
        <img id="weatherIcon" class="weatherIcon" src="">
        <div>
              <div class="weatherTemperature">--°F</div>
              <div class="weatherPlace">Loading…</div>
        </div>
      </a>
    </div>
  </header>

  <div class="sites" id="sites"></div>

  <div class="section-title">For You</div>
  <div class="news" id="spaceNews"><div class="loading">Loading...</div></div>

  <div class="section-title">New York Times</div>
  <div class="news" id="nytNews"><div class="loading">Loading...</div></div>
</div>

<!-- ---------- DESMOS SIDEBAR ---------- -->
<div id="desmosSidebar">
  <div class="desmosHeader">
    <div id="desmosClose">✕</div>
    <div class="toggleContainer">
      <label for="modeSwitch">Graph</label>
      <input type="checkbox" id="modeSwitch" checked>
      <label for="modeSwitch">Sci</label>
    </div>
  </div>
  <iframe id="desmosFrame"
          src="https://www.desmos.com/calculator"
          title="Desmos Graphing Calculator"></iframe>
</div>

<script>
// ==================== SITE LINKS ====================

const SITES = [
  { name:"Canvas", url:"https://canvas.vt.edu/", img:"https://www.nicepng.com/png/full/788-7887218_canvas-lms-has-selected-badgr-as-its-native.png" },
  { name:"HokieSPA", url:"https://hokiespa.vt.edu/", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8LrCGpehZ9ga1kHGwL7quOAMGAyigDWEjPw&s" },
  { name:"GitLab", url:"https://code.vt.edu/space_at_vt", img:"https://images.icon-icons.com/2699/PNG/512/gitlab_logo_icon_169112.png" },
  { name:"LinkedIn", url:"https://www.linkedin.com/feed/", img:"https://static.licdn.com/sc/h/al2o9zrvru7aqj8e1x2rzsrca" }
];

SITES.forEach(s => {
  const d = document.createElement("div");
  d.className = "site";
  d.innerHTML = `<img src="${s.img}" onerror="this.style.display='none'">${s.name}`;
  d.onclick = () => location.href = s.url;
  document.getElementById("sites").appendChild(d);
});

// ==================== DESMOS BUTTON ====================

function addDesmosButton() {
  const linkedInTile = Array.from(document.querySelectorAll('.site'))
                            .find(d => d.textContent.includes('LinkedIn'));
  if (!linkedInTile) return;

  const desmosTile = document.createElement('div');
  desmosTile.className = 'site';
  desmosTile.id = 'desmosBtn';
  desmosTile.innerHTML = `
    <img src="https://www.desmos.com/api/learnosity/images/desmos_logo.png"
         alt="Desmos" onerror="this.style.display='none'">
    Desmos
  `;
  desmosTile.onclick = () => document.body.classList.toggle('desmos-open');
  linkedInTile.insertAdjacentElement('afterend', desmosTile);
}
addDesmosButton();

document.getElementById('desmosClose')
        .addEventListener('click', () => document.body.classList.remove('desmos-open'));

const modeSwitch = document.getElementById('modeSwitch');
const desmosFrame = document.getElementById('desmosFrame');

function updateDesmosSrc(){
  const url = modeSwitch.checked
        ? 'https://www.desmos.com/scientific'
        : 'https://www.desmos.com/calculator';
  desmosFrame.src = url;
}
modeSwitch.addEventListener('change', updateDesmosSrc);
updateDesmosSrc();   // initialise

// ==================== WEATHER ====================

navigator.geolocation.getCurrentPosition(async pos => {
  const {latitude, longitude} = pos.coords;
  try {
    // Fetch current weather
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
    const data = await res.json();

    document.querySelector('.weatherTemperature').innerText = Math.round(data.current_weather.temperature) + "°F";

    const iconMap = {
      0:"https://cdn-icons-png.flaticon.com/512/869/869869.png",
      1:"https://cdn-icons-png.flaticon.com/512/869/869869.png",
      2:"https://cdn-icons-png.flaticon.com/512/1163/1163661.png",
      3:"https://cdn-icons-png.flaticon.com/512/414/414825.png",
      61:"https://cdn-icons-png.flaticon.com/512/1163/1163657.png",
      63:"https://cdn-icons-png.flaticon.com/512/1163/1163657.png",
      65:"https://cdn-icons-png.flaticon.com/512/1163/1163657.png"
    };
    document.getElementById("weatherIcon").src = iconMap[data.current_weather.weathercode] || iconMap[0];

    // Reverse geocode to get a human-readable place name, then update the AccuWeather link.
    // Use the same proxy pattern as RSS to avoid CORS issues; fall back to lat/lon on failure.
    try {
      const geourl = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${latitude}&longitude=${longitude}&language=en`;

      // Prefer proxy (to avoid CORS), but fall back to direct open-meteo and then Nominatim
      let geoData = null;
      try {
        const proxyUrl = PROXIES[0](geourl);
        const geoRes = await fetch(proxyUrl);
        if (geoRes.ok) geoData = await geoRes.json();
      } catch (_) { /* proxy failed */ }

      if (!geoData) {
        try {
          const direct = await fetch(geourl);
          if (direct.ok) geoData = await direct.json();
        } catch (_) { /* direct open-meteo failed */ }
      }

      // If still no useful name, try Nominatim reverse geocode as a second fallback
      if (!geoData || !(geoData.name || geoData.locality || geoData.region || geoData.country)) {
        try {
          const nomUrl = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`;
          const nomRes = await fetch(nomUrl, { headers: { 'Accept-Language': 'en' } });
          if (nomRes.ok) {
            const nomJson = await nomRes.json();
            const addr = nomJson.address || {};
            const display = addr.town || addr.village || addr.city || addr.county || nomJson.display_name;
            if (display) geoData = { ...(geoData || {}), name: display };
          }
        } catch (_) { /* nominatim failed */ }
      }

      const place = (geoData && (geoData.name || geoData.locality || geoData.region || geoData.country)) || '';
      const placeLabel = place || `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`;
      const weatherAnchor = document.querySelector('#weather a');
      weatherAnchor.href = `https://www.accuweather.com/en/search-locations?query=${encodeURIComponent(placeLabel)}`;
      const placeNode = weatherAnchor.querySelector('div > div:last-child');
      if (placeNode) placeNode.innerText = placeLabel;
    } catch (e) {
      console.log('Reverse geocode failed:', e);
      const weatherAnchor = document.querySelector('#weather a');
      const placeNode = weatherAnchor.querySelector('div > div:last-child');
      if (placeNode) placeNode.innerText = `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`;
    }

  } catch(e){ console.log("Weather error:", e); }
}, () => { console.log("Location access denied"); });


// ============================================
// LOGOS
// ============================================

const LOGOS = {
  "NASA": "https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg",
  "SpaceNews": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMzPmQzCRnRprKIys6SXBz9VacKbsmxO-neA&s",
  "NYT": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsb8mTZwu3wBVZPMRGS0ue1b4twc9Rrn1OxA&s",
  "Spaceflight Now": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdCl913Iwq8iEQ1IopeQUHxDxnNRH3J-cyRw&s",
  "Payload": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQL35EoffshsTucTzi6P5_BTbafxR0EXkwYVQ&s"
};

// ============================================
// RSS PARSER WITH MULTIPLE PROXY FALLBACKS
// ============================================

const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

async function parseRSS(url, cacheMinutes = 30, useCacheFirst = true, onFresh = null) {
  const cacheKey = `rsscache:${url}`;

  // Try reading from cache first — return cached immediately (fast UX)
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const obj = JSON.parse(cached);
      if (obj && Array.isArray(obj.items) && (Date.now() - obj.ts) < cacheMinutes * 60 * 1000) {
        const parsedCached = obj.items.map(i => ({ ...i, pubDate: new Date(i.pubDate) }));
        if (useCacheFirst) {
          // Kick off a background refresh but don't block the caller
          (async () => {
            try {
              const fresh = await fetchAndCache(url, cacheKey);
              if (typeof onFresh === 'function') {
                try { onFresh(fresh); } catch(e){ console.log('onFresh handler error', e); }
              }
            } catch(e){ /* ignore */ }
          })();
          return parsedCached;
        } else {
          return parsedCached;
        }
      }
    }
  } catch (e) {
    console.log('Cache read error:', e);
  }

  // No valid cache — fetch now
  try {
    const parsed = await fetchAndCache(url, cacheKey);
    if (typeof onFresh === 'function') {
      try { onFresh(parsed); } catch(e){ console.log('onFresh handler error', e); }
    }
    return parsed;
  } catch (e) {
    console.error(`All proxies failed for ${url}:`, e);
    return [];
  }
}

// Helper: fetch using multiple proxies in parallel with timeouts, parse and cache
async function fetchAndCache(url, cacheKey) {
  // Timeout helper
  const fetchWithTimeout = (resource, ms = 8000) => {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), ms);
    return fetch(resource, { signal: controller.signal }).finally(() => clearTimeout(id));
  };

  // Try all proxies in parallel and take the first valid one
  const attempts = PROXIES.map(fn => (async () => {
    const proxyUrl = fn(url);
    try {
      const res = await fetchWithTimeout(proxyUrl, 8000);
      if (!res.ok) throw new Error(`Status ${res.status}`);
      const text = await res.text();
      if (!text || text.length < 50) throw new Error('Response too short');
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");
      if (xml.querySelector('parsererror')) throw new Error('XML parse error');
      return xml;
    } catch (e) {
      throw e;
    }
  })());

  let xml = null;
  try {
    // Promise.any returns first fulfilled, or throws AggregateError
    xml = await Promise.any(attempts);
  } catch (aggErr) {
    throw aggErr;
  }

  // Extract items (support RSS and Atom)
  let items = xml.querySelectorAll("item");
  if (items.length === 0) items = xml.querySelectorAll("entry");

  const parsed = Array.from(items).map(item => {
    const title = item.querySelector("title")?.textContent?.trim() || "No Title";

    let link = "";
    const rssLink = item.querySelector("link");
    if (rssLink) {
      link = rssLink.textContent?.trim() || rssLink.getAttribute("href") || "";
    }
    if (!link) {
      const atomLink = item.querySelector("link[href]");
      link = atomLink?.getAttribute("href") || "";
    }

    let pubDate = new Date();
    const dateEl = item.querySelector("pubDate, published, updated");
    if (dateEl) {
      const parsedDate = new Date(dateEl.textContent);
      if (!isNaN(parsedDate.getTime())) pubDate = parsedDate;
    }

    let image = null;
    const mediaContent = item.querySelector("media\\:content, content");
    if (mediaContent) image = mediaContent.getAttribute("url") || mediaContent.getAttribute("src");
    if (!image) {
      const enclosure = item.querySelector("enclosure");
      if (enclosure && enclosure.getAttribute("type")?.startsWith("image")) image = enclosure.getAttribute("url");
    }
    if (!image) {
      const mediaThumbnail = item.querySelector("media\\:thumbnail, thumbnail");
      if (mediaThumbnail) image = mediaThumbnail.getAttribute("url");
    }
    if (!image) {
      // look inside content:encoded / description / summary / content for an <img>
      const contentEl = item.querySelector("content\\:encoded, description, summary, content");
      const desc = contentEl ? (contentEl.textContent || contentEl.innerHTML || "") : "";
      const imgMatch = desc.match(/<img[^>]+src=(?:\"|')([^\"']+)(?:\"|')/i);
      if (imgMatch) image = imgMatch[1];
    }

    // Final fallback: serialize the whole <item> to a string and search for an <img>
    if (!image) {
      try {
        const serialized = new XMLSerializer().serializeToString(item);
        const imgMatch2 = serialized.match(/<img[^>]+src=(?:\"|')([^\"']+)(?:\"|')/i);
        if (imgMatch2) {
          image = imgMatch2[1];
          console.log('RSS image found via serialized item:', image);
        }
      } catch (e) { /* ignore serialization errors */ }
    }

    // extract description/content text (safe plain-text) for preview
    let rawHtml = item.querySelector("content\\:encoded, description, summary, content")?.textContent || "";
    if (!rawHtml) rawHtml = item.querySelector("description")?.textContent || "";
    const tmp = document.createElement('div');
    tmp.innerHTML = rawHtml || '';
    const cleanText = (tmp.textContent || tmp.innerText || '').trim().replace(/\s+/g, ' ');
    const excerpt = cleanText.length > 320 ? cleanText.slice(0, 317) + '...' : cleanText;

    return { title, link, pubDate, image, description: cleanText, excerpt };
  });

  // Cache serialized dates
  try {
    const store = parsed.map(a => ({ ...a, pubDate: a.pubDate.toISOString() }));
    localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), items: store }));
  } catch (e) {
    console.log('Cache write error:', e);
  }

  return parsed;
}

// ============================================
// TIME AGO
// ============================================

function timeAgo(date) {
  if (!(date instanceof Date) || isNaN(date.getTime())) {
    return "Recently";
  }
  
  const diff = (new Date() - date) / 1000;
  
  if (diff < 60) return "Just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 604800) return Math.floor(diff / 86400) + "d ago";
  return Math.floor(diff / 604800) + "w ago";
}

// ============================================
// FETCH FEEDS
// ============================================

async function fetchFeeds(feeds, containerId, windowHours = 24, limit = 8, cacheMinutes = 30) {
  console.log(`\n📡 Fetching feeds for ${containerId}...`);
  
  // We'll populate quickly from cache, then update when fresh data arrives.
  let allArticles = [];

  const recomputeAndRender = () => {
    const now = new Date();
    const filteredArticles = allArticles.filter(a => {
      const ageMs = now - a.pubDate;
      const ageHours = ageMs / (1000 * 60 * 60);
      return ageHours < windowHours && ageHours >= 0;
    });
    filteredArticles.sort((a, b) => b.pubDate - a.pubDate);

    // Deduplicate by link (or title fallback) to avoid cached/refresh race duplicates
    const seen = new Set();
    const unique = [];
    for (const art of filteredArticles) {
      const key = (art.link || art.title || '').trim();
      if (!key) continue;
      if (!seen.has(key)) {
        seen.add(key);
        unique.push(art);
      }
    }

    const limitedArticles = unique.slice(0, limit);
    console.log(`  Total: ${unique.length} articles (deduped, within ${windowHours}h), showing ${limitedArticles.length}`);
    renderArticles(limitedArticles, containerId);
  };

  for (const feed of feeds) {
    for (const url of feed.urls) {
      // onFresh will replace articles coming from this url and re-render
      const onFresh = (freshItems) => {
        // tag fresh items with source and origin
        const tagged = freshItems.map(a => ({ ...a, source: feed.name, origin: url }));
        // remove old items from this origin
        allArticles = allArticles.filter(x => x.origin !== url);
        // add fresh items
        allArticles.push(...tagged);
        recomputeAndRender();
      };

      const articles = await parseRSS(url, cacheMinutes, true, onFresh);
      console.log(`  ${feed.name}: Found ${articles.length} articles (cache)`);
      const withSource = articles.map(a => ({ ...a, source: feed.name, origin: url }));
      allArticles.push(...withSource);
    }
  }

  // initial render using cached data (if any)
  recomputeAndRender();
}

// ============================================
// RENDER ARTICLES
// ============================================

const PLACEHOLDER_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 200'%3E%3Crect fill='%233a3944' width='400' height='200'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23b0b3c0' font-family='sans-serif' font-size='16'%3ENo Image%3C/text%3E%3C/svg%3E";

function renderArticles(articles, containerId) {
  const container = document.getElementById(containerId);

  if (articles.length === 0) {
    container.innerHTML = "<div class='loading'>No recent articles found</div>";
    return;
  }

  container.innerHTML = "";

  // cache last render for responsive redraws
  window._lastRenders = window._lastRenders || {};
  window._lastRenders[containerId] = articles;

  // Determine columns (approx based on min card width similar to CSS minmax 280px)
  const minCard = 300;
  const cols = Math.max(1, Math.floor(container.clientWidth / minCard));

  // Create column wrappers
  const columns = [];
  for (let c = 0; c < cols; c++) {
    const col = document.createElement('div');
    col.className = 'news-column';
    container.appendChild(col);
    columns.push(col);
  }

  articles.forEach((article, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => window.open(article.link, "_blank");

    const imgSrc = article.image || PLACEHOLDER_IMG;
    const logoSrc = LOGOS[article.source] || "";

    card.innerHTML = `
      <div class="timeago">${timeAgo(article.pubDate)}</div>
       <img class="hero" src="${imgSrc}" 
         onerror="this.src='${PLACEHOLDER_IMG}'"
         alt="${article.title}">
      <div class="card-content">
        <div class="source">
          <img src="${logoSrc}" 
               onerror="this.style.display='none'"
               alt="${article.source}">
          ${article.source}
        </div>
        <div class="title">${article.title}</div>
      </div>
    `;

    // add a safe text-only excerpt under the title
    const contentEl = card.querySelector('.card-content') || card;
    const excerptEl = document.createElement('div');
    excerptEl.className = 'excerpt';
    excerptEl.textContent = article.excerpt || article.description || '';
    contentEl.appendChild(excerptEl);

    // distribute in row-major order: i -> column (i % cols)
    const target = columns[idx % columns.length] || container;
    target.appendChild(card);
  });
}

// redraw on resize (debounced)
(() => {
  let t = null;
  window.addEventListener('resize', () => {
    if (t) clearTimeout(t);
    t = setTimeout(() => {
      if (!window._lastRenders) return;
      Object.keys(window._lastRenders).forEach(id => {
        try { renderArticles(window._lastRenders[id], id); } catch (e) { /* ignore */ }
      });
    }, 180);
  });
})();

// ============================================
// LOAD ALL FEEDS
// ============================================

// LOAD ALL FEEDS — try prebuilt JSON (from GitHub Actions) first, fall back to runtime fetch
(async function loadOrFetch() {
  try {
    const res = await fetch('/data/feeds.json', { cache: 'no-cache' });
    if (res.ok) {
      const json = await res.json();

      if (json.spaceNews && json.spaceNews.length) {
        const sArticles = json.spaceNews.map(a => ({ ...a, pubDate: new Date(a.pubDate) }));
        // show latest 4 within window — reuse existing renderer behavior
        renderArticles(sArticles.slice(0, 8), 'spaceNews');
      } else {
        fetchFeeds([
          { name: "NASA", urls: ["https://www.nasa.gov/rss/dyn/breaking_news.rss"] },
          { name: "SpaceNews", urls: ["https://spacenews.com/feed/"] },
          { name: "New Scientist", urls: ["https://www.newscientist.com/subject/space/feed/"] },
          { name: "Spaceflight Now", urls: ["https://spaceflightnow.com/feed/"] },
          { name: "Payload", urls: ["https://payloadspace.com/feed/"] }
        ], 'spaceNews', 24, 8, 30);
      }

      if (json.nytNews && json.nytNews.length) {
        const nArticles = json.nytNews.map(a => ({ ...a, pubDate: new Date(a.pubDate) }));
        renderArticles(nArticles.slice(0, 8), 'nytNews');
      } else {
        fetchFeeds([
          { name: "NYT", urls: ["https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml"] }
        ], 'nytNews', 24, 8, 30);
      }

      return;
    }
  } catch (e) {
    console.log('Prefetched feeds not available, falling back to runtime fetch', e);
  }

  // Fallback to runtime fetching (may hit CORS on deployed GitHub Pages)
  fetchFeeds([
    { name: "NASA", urls: ["https://www.nasa.gov/rss/dyn/breaking_news.rss"] },
    { name: "SpaceNews", urls: ["https://spacenews.com/feed/"] },
    { name: "New Scientist", urls: ["https://www.newscientist.com/subject/space/feed/"] },
    { name: "Spaceflight Now", urls: ["https://spaceflightnow.com/feed/"] },
    { name: "Payload", urls: ["https://payloadspace.com/feed/"] }
  ], 'spaceNews', 24, 8, 30);

  fetchFeeds([
    { name: "NYT", urls: ["https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml"] }
  ], 'nytNews', 24, 8, 30);
})();
